name: Publish GitHub Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing semantic version tag to publish, for example v1.1.0
        required: true
        type: string

permissions:
  contents: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must look like v1.2.3. Got: $TAG" >&2
            exit 1
          fi

          git checkout "$TAG"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Verify package version matches tag
        shell: bash
        run: |
          set -euo pipefail

          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_VERSION="${{ steps.release_tag.outputs.version }}"

          if [ "$PACKAGE_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "package.json version ($PACKAGE_VERSION) does not match release tag ($EXPECTED_VERSION)." >&2
            exit 1
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: ${{ steps.release_tag.outputs.tag }}
          generate_release_notes: true
          make_latest: true
