name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DATABASE_URL: file:./prisma/data/ci.db

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          for attempt in 1 2 3; do
            npm ci \
              --fetch-retries=5 \
              --fetch-retry-factor=2 \
              --fetch-retry-mintimeout=10000 \
              --fetch-retry-maxtimeout=60000 && exit 0

            if [ "$attempt" -eq 3 ]; then
              echo "npm ci failed after $attempt attempts"
              exit 1
            fi

            echo "npm ci failed on attempt $attempt; retrying..."
            sleep $((attempt * 10))
          done

      - name: Run typecheck
        run: npm run typecheck

  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          for attempt in 1 2 3; do
            npm ci \
              --fetch-retries=5 \
              --fetch-retry-factor=2 \
              --fetch-retry-mintimeout=10000 \
              --fetch-retry-maxtimeout=60000 && exit 0

            if [ "$attempt" -eq 3 ]; then
              echo "npm ci failed after $attempt attempts"
              exit 1
            fi

            echo "npm ci failed on attempt $attempt; retrying..."
            sleep $((attempt * 10))
          done

      - name: Run production build
        run: npm run build

  smoke-e2e:
    name: smoke-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install sqlite3
        run: sudo apt-get update && sudo apt-get install -y sqlite3

      - name: Install dependencies
        shell: bash
        run: |
          for attempt in 1 2 3; do
            npm ci \
              --fetch-retries=5 \
              --fetch-retry-factor=2 \
              --fetch-retry-mintimeout=10000 \
              --fetch-retry-maxtimeout=60000 && exit 0

            if [ "$attempt" -eq 3 ]; then
              echo "npm ci failed after $attempt attempts"
              exit 1
            fi

            echo "npm ci failed on attempt $attempt; retrying..."
            sleep $((attempt * 10))
          done

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke suite
        run: npm run smoke:e2e
