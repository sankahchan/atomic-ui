name: Create Release Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version to tag, for example 1.0.1 or v1.1.0
        required: true
        type: string
      target_ref:
        description: Branch or commit to tag
        required: false
        default: main
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.target_ref }}

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          set -euo pipefail

          RAW_VERSION="${{ github.event.inputs.version }}"
          if [[ "$RAW_VERSION" =~ ^v ]]; then
            TAG="$RAW_VERSION"
          else
            TAG="v$RAW_VERSION"
          fi

          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must look like v1.2.3. Got: $TAG" >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Verify package version matches tag
        shell: bash
        run: |
          set -euo pipefail

          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_VERSION="${{ steps.release_tag.outputs.version }}"

          if [ "$PACKAGE_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "package.json version ($PACKAGE_VERSION) does not match release tag ($EXPECTED_VERSION)." >&2
            exit 1
          fi

      - name: Ensure tag does not already exist
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ steps.release_tag.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally." >&2
            exit 1
          fi

          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists on origin." >&2
            exit 1
          fi

      - name: Create and push tag
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ steps.release_tag.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
