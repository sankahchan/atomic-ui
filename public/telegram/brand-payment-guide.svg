<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1120" y2="635" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="1" stop-color="#121C34"/>
    </linearGradient>
    <linearGradient id="panel" x1="220" y1="140" x2="980" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101A32"/>
      <stop offset="1" stop-color="#0D1528"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="260" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="blur" x="-100" y="-100" width="1400" height="875" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>
  <rect width="1200" height="675" rx="40" fill="url(#bg)"/>
  <g filter="url(#blur)" opacity="0.45">
    <circle cx="260" cy="90" r="140" fill="#06B6D4"/>
    <circle cx="1040" cy="120" r="120" fill="#8B5CF6"/>
    <circle cx="930" cy="540" r="150" fill="#2563EB"/>
  </g>
  <rect x="54" y="54" width="1092" height="567" rx="34" fill="url(#panel)" stroke="rgba(103,232,249,0.18)"/>
  <text x="96" y="120" fill="#8FE8FF" font-size="20" font-family="Segoe UI, Arial, sans-serif" letter-spacing="3.2">ATOMIC-UI</text>
  <text x="96" y="178" fill="#F8FBFF" font-size="54" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Payment Guide</text>
  <text x="96" y="220" fill="#A9B7D2" font-size="24" font-family="Segoe UI, Arial, sans-serif">Choose a method, confirm the account, send one clear screenshot, then wait for review.</text>

  <g transform="translate(1012 108)">
    <circle cx="0" cy="0" r="48" fill="#E9FDFF"/>
    <ellipse cx="0" cy="0" rx="34" ry="12" stroke="#06B6D4" stroke-width="3"/>
    <ellipse cx="0" cy="0" rx="34" ry="12" transform="rotate(60)" stroke="#38BDF8" stroke-width="3"/>
    <ellipse cx="0" cy="0" rx="34" ry="12" transform="rotate(120)" stroke="#8B5CF6" stroke-width="3"/>
    <circle cx="0" cy="0" r="8" fill="#06B6D4"/>
    <circle cx="0" cy="0" r="4" fill="#fff"/>
  </g>

  <rect x="94" y="274" width="312" height="248" rx="24" fill="#0E1830" stroke="rgba(103,232,249,0.16)"/>
  <rect x="118" y="300" width="108" height="36" rx="18" fill="url(#accent)"/>
  <text x="140" y="324" fill="#03202B" font-size="16" font-weight="700" font-family="Segoe UI, Arial, sans-serif">STEP 1</text>
  <text x="118" y="372" fill="#F8FBFF" font-size="28" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Choose Method</text>
  <text x="118" y="414" fill="#B6C1D7" font-size="21" font-family="Segoe UI, Arial, sans-serif">Pick KBZ Pay, AYA Pay, Wave, or your configured payment method.</text>
  <text x="118" y="458" fill="#D8F6FB" font-size="19" font-family="Segoe UI, Arial, sans-serif">• Confirm the account name</text>
  <text x="118" y="490" fill="#D8F6FB" font-size="19" font-family="Segoe UI, Arial, sans-serif">• Confirm the account number</text>

  <rect x="444" y="274" width="312" height="248" rx="24" fill="#0E1830" stroke="rgba(103,232,249,0.16)"/>
  <rect x="468" y="300" width="108" height="36" rx="18" fill="url(#accent)"/>
  <text x="490" y="324" fill="#03202B" font-size="16" font-weight="700" font-family="Segoe UI, Arial, sans-serif">STEP 2</text>
  <text x="468" y="372" fill="#F8FBFF" font-size="28" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Send One Proof</text>
  <text x="468" y="414" fill="#B6C1D7" font-size="21" font-family="Segoe UI, Arial, sans-serif">One screenshot only. Make the amount, transfer ID, and payment time clearly visible.</text>
  <text x="468" y="458" fill="#D8F6FB" font-size="19" font-family="Segoe UI, Arial, sans-serif">• Photo or document is okay</text>
  <text x="468" y="490" fill="#D8F6FB" font-size="19" font-family="Segoe UI, Arial, sans-serif">• Avoid duplicate or blurry crops</text>

  <rect x="794" y="274" width="312" height="248" rx="24" fill="#0E1830" stroke="rgba(103,232,249,0.16)"/>
  <rect x="818" y="300" width="108" height="36" rx="18" fill="url(#accent)"/>
  <text x="840" y="324" fill="#03202B" font-size="16" font-weight="700" font-family="Segoe UI, Arial, sans-serif">STEP 3</text>
  <text x="818" y="372" fill="#F8FBFF" font-size="28" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Wait for Review</text>
  <text x="818" y="414" fill="#B6C1D7" font-size="21" font-family="Segoe UI, Arial, sans-serif">Atomic-UI updates your order status in Telegram after review and delivery.</text>
  <text x="818" y="458" fill="#D8F6FB" font-size="19" font-family="Segoe UI, Arial, sans-serif">• Check /orders or /order</text>
  <text x="818" y="490" fill="#D8F6FB" font-size="19" font-family="Segoe UI, Arial, sans-serif">• Use Support if something is wrong</text>

  <rect x="94" y="548" width="1012" height="44" rx="22" fill="rgba(103,232,249,0.12)" stroke="rgba(103,232,249,0.12)"/>
  <text x="128" y="577" fill="#DFFBFF" font-size="18" font-family="Segoe UI, Arial, sans-serif">Atomic-UI Telegram checkout • clearer steps • better payment proof success rate</text>
</svg>
