  <text x="764" y="294" fill="#FFF5DA" font-family="Arial, sans-serif" font-size="28" font-weight="700">What usually goes wrong</text>
  <text x="700" y="352" fill="#FFE8B8" font-family="Arial, sans-serif" font-size="24">1. Screenshot is cropped too tightly</text>
